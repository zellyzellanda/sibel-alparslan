<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e8e1d8" />
    <meta name="description" content="Sibel ve Alparslan'ın 22 Ağustos 2026 tarihli düğün davetiyesi." />
    <title>Sibel &amp; Alparslan | Düğün Davetiyesi</title>
    <style>
      :root{--ink:#3f3b38;--muted:#716d67;--blush:#d8a7ae;--sage:#9daea2}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#ddd6ca}body{color:var(--ink);font-family:Georgia,"Times New Roman",serif}.page{position:relative;isolation:isolate;display:grid;grid-template-rows:auto minmax(0,1fr) auto;min-height:100svh;overflow:hidden;padding:28px 34px 24px;background:radial-gradient(circle at 48% 43%,rgba(255,255,255,.82),transparent 40%),linear-gradient(145deg,#d9d0c4 0%,#eee9e1 46%,#d2c9bc 100%)}.linen{position:absolute;z-index:-3;inset:0;opacity:.48;pointer-events:none;background-image:repeating-linear-gradient(88deg,rgba(87,76,63,.07) 0 1px,transparent 1px 5px),repeating-linear-gradient(2deg,rgba(255,255,255,.2) 0 1px,transparent 1px 4px);mix-blend-mode:multiply}.linen:after{content:"";position:absolute;inset:0;opacity:.25;background-image:radial-gradient(rgba(61,51,43,.28) .45px,transparent .6px);background-size:7px 6px}.ambient{position:absolute;z-index:-2;width:34vw;aspect-ratio:1;border-radius:50%;filter:blur(70px);opacity:.18;pointer-events:none}.one{top:-20%;left:-8%;background:#dfadb4}.two{right:-12%;bottom:-24%;background:#9eafa1}.header{z-index:3;display:flex;align-items:center;justify-content:space-between;gap:24px;width:100%;animation:reveal .9s .18s both}.header p{margin:0}.eyebrow{font-size:15px;font-style:italic;letter-spacing:.08em}.details{display:flex;align-items:center;gap:10px;color:var(--muted);font-family:Arial,Helvetica,sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase}.sep{color:var(--blush)}.stage{position:relative;z-index:2;display:grid;place-items:center;min-height:0;perspective:1500px}.card{--rx:0deg;--ry:0deg;--lx:35%;--ly:18%;position:relative;z-index:3;width:min(29vw,420px,calc(72svh * .625));min-width:280px;aspect-ratio:5/8;padding:0;border:0;border-radius:1px;outline:none;background:transparent;cursor:zoom-in;transform-style:preserve-3d;transform:rotateX(var(--rx)) rotateY(var(--ry)) rotateZ(-1.25deg) translateY(5px);transition:transform .18s ease-out,filter .5s ease,width .7s cubic-bezier(.2,.8,.2,1);animation:arrival 1.1s cubic-bezier(.17,.86,.35,1) both;filter:drop-shadow(0 26px 22px rgba(50,41,33,.18))}.card:before{content:"";position:absolute;z-index:-2;inset:5% 1% -3% 6%;border-radius:50%;background:rgba(55,43,33,.34);filter:blur(24px);transform:translateZ(-40px) rotateZ(2deg);transition:opacity .4s,transform .5s}.card:focus-visible{outline:2px solid rgba(84,104,91,.72);outline-offset:8px}.edge{position:absolute;z-index:-1;inset:0 -3px -4px 2px;border-radius:1px 2px 3px 1px;background:linear-gradient(135deg,#eee9df 5%,#c8c0b5 45%,#f6f2e9 100%);box-shadow:inset -1px -1px 0 rgba(91,79,67,.16);transform:translateZ(-4px)}.face{position:absolute;inset:0;overflow:hidden;border-radius:1px;background:#f7f4ed;box-shadow:inset 0 0 0 1px rgba(87,76,63,.08),inset 0 0 18px rgba(82,68,55,.04),0 2px 3px rgba(255,255,255,.3);transform:translateZ(1px)}.face img{position:absolute;inset:0;display:block;width:100%;height:100%;object-fit:cover;user-select:none;-webkit-user-drag:none}.light{position:absolute;inset:0;pointer-events:none;opacity:.22;background:radial-gradient(circle at var(--lx) var(--ly),rgba(255,255,255,.95),transparent 31%),linear-gradient(112deg,transparent 25%,rgba(255,255,255,.18) 48%,transparent 70%);mix-blend-mode:soft-light}.petals{position:absolute;z-index:1;width:120px;height:200px;pointer-events:none;filter:drop-shadow(0 10px 8px rgba(57,48,40,.12));opacity:.72;animation:petals 1.2s .35s both}.petals i{position:absolute;display:block;width:36px;height:17px;border-radius:100% 4% 100% 4%;background:rgba(205,139,151,.46);box-shadow:inset 0 0 0 1px rgba(110,86,87,.09)}.left{left:10%;bottom:11%;transform:rotate(-24deg)}.right{right:11%;top:14%;transform:rotate(24deg) scale(.82)}.petals i:nth-child(1){left:22px;top:52px;transform:rotate(24deg)}.petals i:nth-child(2){left:48px;top:73px;transform:rotate(82deg);background:rgba(132,157,139,.42)}.petals i:nth-child(3){left:11px;top:88px;transform:rotate(-17deg)}.petals i:nth-child(4){left:53px;top:117px;transform:rotate(48deg);background:rgba(132,157,139,.36)}.backdrop{position:fixed;z-index:8;inset:0;display:block;padding:0;border:0;background:rgba(43,38,34,.42);backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity .5s}.focused .backdrop{opacity:1;pointer-events:auto}.focused .stage{z-index:10}.focused .card{position:fixed;z-index:10;top:50%;left:50%;width:min(88vw,520px,calc(91svh * .625));min-width:0;cursor:zoom-out;transform:translate(-50%,-50%) rotateX(0) rotateY(0) rotateZ(0);filter:drop-shadow(0 32px 38px rgba(30,25,21,.32));transition:transform .7s cubic-bezier(.2,.8,.2,1),filter .5s,width .7s cubic-bezier(.2,.8,.2,1)}.hint{z-index:11;display:flex;align-items:center;justify-content:center;gap:9px;margin:0;color:rgba(63,59,56,.78);font-family:Arial,Helvetica,sans-serif;font-size:9px;letter-spacing:.17em;text-transform:uppercase;animation:reveal .9s .5s both}.mouse{display:inline-block;width:14px;height:18px;border:1px solid currentColor;border-radius:8px}.mouse:before{content:"";display:block;width:2px;height:4px;margin:3px auto 0;border-radius:2px;background:currentColor;animation:dot 1.6s ease-in-out infinite}.focused .hint{position:fixed;z-index:12;right:0;bottom:18px;left:0;color:rgba(255,255,255,.86)}@keyframes arrival{from{opacity:0;transform:translateY(60px) rotateX(18deg) rotateY(-7deg) rotateZ(-3deg) scale(.94)}to{opacity:1}}@keyframes reveal{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}@keyframes petals{from{opacity:0;filter:blur(7px)}to{opacity:.72;filter:blur(0) drop-shadow(0 10px 8px rgba(57,48,40,.12))}}@keyframes dot{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(5px)}}@media(max-width:700px){.page{padding:21px 18px 18px}.header{align-items:flex-start}.eyebrow{font-size:13px}.details{font-size:8px;letter-spacing:.13em}.sep,.venue{display:none}.card{width:min(82vw,350px,calc(72svh * .625));min-width:244px;transform:rotateX(var(--rx)) rotateY(var(--ry)) rotateZ(-.7deg)}.petals{transform:scale(.58) rotate(-20deg)}.left{left:-4%}.right{right:-4%;transform:scale(.5) rotate(22deg)}.hint{font-size:8px;letter-spacing:.12em}}@media(max-height:700px){.page{padding-top:18px}.card{width:min(42vw,340px,calc(68svh * .625))}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
    </style>
  </head>
  <body>
    <main class="page" id="page">
      <div class="linen" aria-hidden="true"></div><div class="ambient one" aria-hidden="true"></div><div class="ambient two" aria-hidden="true"></div>
      <header class="header" aria-label="Düğün davetiyesi başlığı"><p class="eyebrow">Sibel &amp; Alparslan</p><p class="details"><span>22 Ağustos 2026</span><span class="sep">·</span><span class="venue">Değirmenbaşı, Gölcük</span></p></header>
      <section class="stage" aria-label="Sibel ve Alparslan'ın düğün davetiyesi">
        <div class="petals left" aria-hidden="true"><i></i><i></i><i></i><i></i></div><div class="petals right" aria-hidden="true"><i></i><i></i><i></i></div>
        <button class="card" id="card" type="button" aria-label="Davetiyeyi yakından görüntüle" aria-pressed="false"><span class="edge" aria-hidden="true"></span><span class="face"><img src="davetiye.jpg" width="1280" height="2048" alt="Sibel ve Alparslan'ın 22 Ağustos 2026 tarihli düğün davetiyesi" /><span class="light" aria-hidden="true"></span></span></button>
      </section>
      <button class="backdrop" id="backdrop" type="button" aria-label="Yakın görünümü kapat" tabindex="-1"></button>
      <p class="hint"><span class="mouse" aria-hidden="true"></span><span id="hint">Yakından görmek için davetiyeye dokun</span></p>
    </main>
    <script>
      const page=document.getElementById('page'),card=document.getElementById('card'),backdrop=document.getElementById('backdrop'),hint=document.getElementById('hint');let focused=false;
      function setFocus(next){focused=next;page.classList.toggle('focused',focused);card.setAttribute('aria-pressed',String(focused));card.setAttribute('aria-label',focused?'Davetiyeyi normal görünümüne döndür':'Davetiyeyi yakından görüntüle');backdrop.tabIndex=focused?0:-1;hint.textContent=focused?'Kapatmak için davetiyeye dokun':'Yakından görmek için davetiyeye dokun'}
      card.addEventListener('click',()=>setFocus(!focused));backdrop.addEventListener('click',()=>setFocus(false));document.addEventListener('keydown',e=>{if(e.key==='Escape')setFocus(false)});
      card.addEventListener('pointermove',e=>{if(e.pointerType!=='mouse'||focused)return;const r=card.getBoundingClientRect(),x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;card.style.setProperty('--ry',`${(x-.5)*10}deg`);card.style.setProperty('--rx',`${(.5-y)*8}deg`);card.style.setProperty('--lx',`${x*100}%`);card.style.setProperty('--ly',`${y*100}%`)});
      card.addEventListener('pointerleave',()=>{card.style.setProperty('--ry','0deg');card.style.setProperty('--rx','0deg');card.style.setProperty('--lx','35%');card.style.setProperty('--ly','18%')});
    </script>
  </body>
</html>
